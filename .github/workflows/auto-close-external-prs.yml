name: Auto-close external PRs

on:
  pull_request_target:
    types: [opened, reopened]

permissions:
  pull-requests: write

jobs:
  close-external-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Auto-close PR from non-collaborator/non-owner
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pr = context.payload.pull_request;
            const author = pr.user.login;

            // Never auto-close owner-created PRs.
            if (author.toLowerCase() === owner.toLowerCase()) {
              core.info(`PR author is repository owner (${author}); leaving PR open.`);
              return;
            }

            // Check collaborator permission on this repository.
            // If user has any explicit permission, leave PR open.
            let isCollaborator = false;
            try {
              const resp = await github.rest.repos.getCollaboratorPermissionLevel({
                owner,
                repo,
                username: author,
              });
              const perm = resp.data.permission || "none";
              isCollaborator = perm !== "none";
              core.info(`Permission for ${author}: ${perm}`);
            } catch (err) {
              // 404 here usually means not a collaborator.
              core.info(`Could not resolve collaborator permission for ${author}; treating as external.`);
            }

            if (isCollaborator) {
              core.info(`PR author ${author} is a collaborator; leaving PR open.`);
              return;
            }

            const body = [
              "This repository does not accept pull requests from external contributors.",
              "",
              "Your PR is being closed automatically by repository policy.",
            ].join("\n");

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: pr.number,
              body,
            });

            await github.rest.pulls.update({
              owner,
              repo,
              pull_number: pr.number,
              state: "closed",
            });

            core.info(`Closed external PR #${pr.number} from ${author}.`);
