name: pikp-dev

networks:
  pikp_net:
    name: pikp_net
    driver: bridge

services:
  postgres:
    image: postgres:17
    container_name: pikp-dev-postgres
    restart: unless-stopped
    security_opt:
      - label=disable
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      PGDATA: ${PGDATA}
    command:
      - postgres
      - -c
      - wal_level=logical
    ports:
      - "${PG_PORT_HOST:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB} -h 127.0.0.1 -p 5432"]
      interval: 3s
      timeout: 3s
      retries: 20
    networks:
      - pikp_net
    volumes:
      - ../../data/pgdb:${PGDATA}
      - ../platform/postgres/init:/docker-entrypoint-initdb.d:ro

  pentaho:
    image: ${PENTAHO_IMAGE}
    container_name: ${PENTAHO_CONTAINER}
    restart: unless-stopped
    security_opt:
      - label=disable
    env_file:
      - .env
    profiles:
      - tools
    ports:
      - "${PENTAHO_WEB_PORT_HOST}:8080"
    networks:
      - pikp_net
    volumes:
      - ../platform/pentaho:/workspace/pentaho
      - ../../raw:/workspace/raw:ro

  superset:
    image: ${SUPERSET_IMAGE}
    container_name: ${SUPERSET_CONTAINER}
    restart: unless-stopped
    security_opt:
      - label=disable
    env_file:
      - .env
    profiles:
      - tools
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SUPERSET_CONFIG_PATH: /app/pythonpath/superset_config.py
      SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY}
      SUPERSET_META_DB_URI: ${SUPERSET_META_DB_URI}
      SUPERSET_ADMIN_USERNAME: ${SUPERSET_ADMIN_USERNAME}
      SUPERSET_ADMIN_PASSWORD: ${SUPERSET_ADMIN_PASSWORD}
      SUPERSET_ADMIN_FIRST_NAME: ${SUPERSET_ADMIN_FIRST_NAME}
      SUPERSET_ADMIN_LAST_NAME: ${SUPERSET_ADMIN_LAST_NAME}
      SUPERSET_ADMIN_EMAIL: ${SUPERSET_ADMIN_EMAIL}
    ports:
      - "${SUPERSET_WEB_PORT_HOST}:8088"
    networks:
      - pikp_net
    volumes:
      - ../platform/superset/superset_config.py:/app/pythonpath/superset_config.py:ro
      - ../platform/superset/bootstrap.sh:/app/docker/project/bootstrap.sh:ro
      - ../../data/superset:/app/superset_home
    command:
      - /bin/bash
      - /app/docker/project/bootstrap.sh
